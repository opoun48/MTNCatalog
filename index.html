<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Book Viewer (Stable Auto-Flip)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
        body { 
            background-color: #0f172a; 
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #bookContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .flip-book {
            margin: 0 auto;
            background-color: #1e293b;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .flip-book.ready {
            opacity: 1;
        }
        .page { background-color: white; overflow: hidden; }
        .page-content { width: 100%; height: 100%; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        .control-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        /* ปุ่ม Fullscreen แยกต่างหาก */
        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        #playPauseBtn {
            position: fixed;
            top: 20px;
            right: 160px; /* เว้นที่ให้ปุ่ม fullscreen */
            z-index: 50;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        /* iPad portrait: แสดงแบบ single page */
        @media (max-width: 1024px) and (orientation: portrait) {
            #bookContainer {
                padding: 0;
            }
        }

        /* Fullscreen mode */
        :fullscreen #bookContainer,
        :-webkit-full-screen #bookContainer {
            padding: 0;
            background-color: #0f172a;
        }
        :fullscreen body,
        :-webkit-full-screen body {
            background-color: #0f172a;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center">

    <button id="playPauseBtn" onclick="toggleAutoFlip()" class="hidden px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
        <span id="btnIcon">⏸️</span>
        <span id="btnText">กำลังเล่นอัตโนมัติ</span>
    </button>

    <button id="fullscreenBtn" onclick="toggleFullscreen()" class="hidden px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
        <span id="fsIcon">⛶</span>
        <span id="fsText">เต็มจอ</span>
    </button>

    <div id="status" class="text-indigo-400 font-medium text-lg animate-pulse">กำลังโหลดแคตตาล็อก...</div>

    <div id="bookContainer" class="hidden">
        <div class="flip-book" id="flipbook"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageFlip;
        let autoFlipInterval = null;
        let isAutoPlaying = false;
        let isFlipping = false; 
        let totalPages = 0;

        const currentEbook = "catalog (1).pdf"; 
        const flipSpeed = 5000;

        // ตรวจจับ iPad
        const isIPad = /iPad/i.test(navigator.userAgent) || 
                       (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        window.addEventListener('DOMContentLoaded', () => {
            loadPDF(`ebook/${currentEbook}`);
            setupFullscreenListener();
        });

        // ============================================================
        // FULLSCREEN
        // ============================================================
        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                enterFullscreen();
            } else {
                exitFullscreen();
            }
        }

        function enterFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) {
                el.requestFullscreen();
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen(); // Safari / iPad
            }
        }

        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }

        function setupFullscreenListener() {
            const onFSChange = () => {
                const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
                document.getElementById('fsIcon').innerText = isFS ? '✕' : '⛶';
                document.getElementById('fsText').innerText  = isFS ? 'ออกจากเต็มจอ' : 'เต็มจอ';

                // Resize pageFlip ให้พอดีกับขนาดจอใหม่
                if (pageFlip) {
                    setTimeout(() => pageFlip.update(), 200);
                }
            };
            document.addEventListener('fullscreenchange', onFSChange);
            document.addEventListener('webkitfullscreenchange', onFSChange);
        }

        // ============================================================
        // LOAD PDF
        // ============================================================
        async function loadPDF(fileUrl) {
            if (autoFlipInterval) {
                clearInterval(autoFlipInterval);
                autoFlipInterval = null;
            }

            const status       = document.getElementById('status');
            const container    = document.getElementById('bookContainer');
            const flipbookHtml = document.getElementById('flipbook');

            try {
                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error('ไม่พบไฟล์แคตตาล็อกในโฟลเดอร์ ebook');
                
                const arrayBuffer = await response.arrayBuffer();
                const typedarray  = new Uint8Array(arrayBuffer);
                
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                totalPages = pdf.numPages;
                
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const page     = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 2.2 }); 
                    
                    const pageDiv     = document.createElement('div');
                    pageDiv.className = 'page';
                    const pageContent     = document.createElement('div');
                    pageContent.className = 'page-content';
                    const canvas  = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    canvas.height = viewport.height;
                    canvas.width  = viewport.width;
                    pageContent.appendChild(canvas);
                    pageDiv.appendChild(pageContent);
                    flipbookHtml.appendChild(pageDiv);

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                }

                status.classList.add('hidden');
                container.classList.remove('hidden');

                // ============================================================
                // PageFlip config — iPad portrait: single page, อื่นๆ: double
                // ============================================================
                const isPortrait = window.innerHeight > window.innerWidth;
                const useSingle  = isIPad && isPortrait;

                pageFlip = new St.PageFlip(flipbookHtml, {
                    width:       useSingle ? window.innerWidth  : 841,
                    height:      useSingle ? window.innerHeight : 595,
                    size:        "stretch",
                    minWidth:    useSingle ? window.innerWidth  : 400,
                    maxWidth:    useSingle ? window.innerWidth  : 1600,
                    minHeight:   useSingle ? window.innerHeight : 283,
                    maxHeight:   useSingle ? window.innerHeight : 1131,
                    drawShadow:  true,
                    showCover:   true,
                    usePortrait: useSingle   // true = single page mode
                });

                pageFlip.on('init', () => {
                    requestAnimationFrame(() => {
                        flipbookHtml.classList.add('ready');
                    });
                    document.getElementById('playPauseBtn').classList.remove('hidden');
                    document.getElementById('fullscreenBtn').classList.remove('hidden');
                    startAutoFlip();
                });

                pageFlip.on('flip', () => {
                    isFlipping = true;
                });

                pageFlip.on('changeState', (e) => {
                    if (e.data === 'read') {
                        isFlipping = false;
                        const currentIndex = pageFlip.getCurrentPageIndex();
                        if (currentIndex >= totalPages - 1) {
                            stopAutoFlip();
                        }
                    }
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));

                // Re-init เมื่อหมุนจอ (iPad)
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => location.reload(), 300);
                });

            } catch (error) {
                console.error(error);
                status.innerText = "เกิดข้อผิดพลาด: " + error.message;
                status.classList.remove('animate-pulse');
            }
        }

        // ============================================================
        // AUTO FLIP
        // ============================================================
        function startAutoFlip() {
            if (autoFlipInterval) clearInterval(autoFlipInterval);
            isAutoPlaying = true;
            isFlipping    = false;
            
            document.getElementById('btnIcon').innerText = "⏸️";
            document.getElementById('btnText').innerText = "กำลังเล่นอัตโนมัติ";

            autoFlipInterval = setInterval(() => {
                if (!pageFlip || !isAutoPlaying) return;

                const currentIndex = pageFlip.getCurrentPageIndex();
                if (currentIndex >= totalPages - 1) {
                    stopAutoFlip();
                    return;
                }

                if (!isFlipping) {
                    pageFlip.flipNext();
                }
            }, flipSpeed);
        }

        function stopAutoFlip() {
            isAutoPlaying = false;
            if (autoFlipInterval) {
                clearInterval(autoFlipInterval);
                autoFlipInterval = null;
            }
            document.getElementById('btnIcon').innerText = "▶️";
            document.getElementById('btnText').innerText = "เล่นต่อ";
        }

        function toggleAutoFlip() {
            if (isAutoPlaying) {
                stopAutoFlip();
            } else {
                if (pageFlip && pageFlip.getCurrentPageIndex() >= totalPages - 1) {
                    pageFlip.turnToPage(0);
                }
                startAutoFlip();
            }
        }
    </script>
</body>
</html>
