<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Book Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0f172a;
            overflow: hidden;
            position: fixed;
            width: 100%; height: 100%;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        #overlay.done {
            opacity: 0;
            pointer-events: none;
        }

        #bookContainer {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transform: translateX(-99999px);
        }
        #bookContainer.visible {
            transform: none;
        }

        #flipbook { margin: 0 auto; }
        .page { background: white; overflow: hidden; }
        .page canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        #playPauseBtn {
            position: fixed; top: 20px; right: 160px; z-index: 10000;
            backdrop-filter: blur(8px); transition: all 0.2s;
        }
        #fullscreenBtn {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            backdrop-filter: blur(8px); transition: all 0.2s;
        }

        @media (max-width: 1024px) and (orientation: portrait) {
            #bookContainer { padding: 0; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <span id="loadingText" class="text-indigo-400 font-medium text-lg animate-pulse">
            กำลังโหลดแคตตาล็อก...
        </span>
    </div>

    <button id="playPauseBtn" onclick="toggleAutoFlip()"
        class="hidden px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
        <span id="btnIcon">⏸️</span>
        <span id="btnText">กำลังเล่นอัตโนมัติ</span>
    </button>

    <button id="fullscreenBtn" onclick="toggleFullscreen()"
        class="hidden px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
        <span id="fsIcon">⛶</span>
        <span id="fsText">เต็มจอ</span>
    </button>

    <div id="bookContainer">
        <div id="flipbook"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageFlip, autoFlipInterval;
        let isAutoPlaying  = false;
        let isFlipping     = false;
        let totalPages     = 0;
        let isFullscreen   = false;
        let savedPageIndex = 0; // จำหน้าปัจจุบันไว้ก่อน reinit

        const currentEbook = "catalog (1).pdf";
        const flipSpeed    = 5000;

        const isIPad = /iPad/i.test(navigator.userAgent) ||
                       (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        window.addEventListener('DOMContentLoaded', () => {
            loadPDF(`ebook/${currentEbook}`);
            setupFullscreenListener();
            window.addEventListener('orientationchange', () => {
                if (!isFullscreen) setTimeout(() => location.reload(), 300);
            });
        });

        // ── Fullscreen ──────────────────────────────────────────────
        function toggleFullscreen() {
            const el = document.documentElement;
            if (!isFullscreen) {
                (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        }

        function setupFullscreenListener() {
            const onChange = () => {
                isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
                document.getElementById('fsIcon').innerText = isFullscreen ? '✕' : '⛶';
                document.getElementById('fsText').innerText  = isFullscreen ? 'ออกจากเต็มจอ' : 'เต็มจอ';

                // รอให้ browser ปรับขนาดจอเสร็จก่อน แล้วค่อย reinit
                setTimeout(() => reinitPageFlip(), 400);
            };
            document.addEventListener('fullscreenchange',       onChange);
            document.addEventListener('webkitfullscreenchange', onChange);
        }

        // ── Reinit PageFlip ด้วยขนาดจอปัจจุบัน ──────────────────
        function reinitPageFlip() {
            if (!pageFlip) return;

            // จำหน้าปัจจุบัน
            savedPageIndex = pageFlip.getCurrentPageIndex();

            // หยุด autoflip ชั่วคราว
            const wasPlaying = isAutoPlaying;
            if (wasPlaying) stopAutoFlip();

            // destroy instance เดิม
            try { pageFlip.destroy(); } catch(e) {}

            // สร้างใหม่ด้วยขนาดจอจริงตอนนี้
            const container  = document.getElementById('bookContainer');
            const flipbookEl = document.getElementById('flipbook');

            // ปรับ padding ของ container ตาม fullscreen
            container.style.padding = isFullscreen ? '0' : '20px';

            const W = window.innerWidth;
            const H = window.innerHeight;
            const isPortrait = H > W;
            const useSingle  = isIPad && isPortrait;

            pageFlip = new St.PageFlip(flipbookEl, {
                width:       useSingle ? W : 841,
                height:      useSingle ? H : 595,
                size:        'stretch',
                minWidth:    useSingle ? W : 400,
                maxWidth:    isFullscreen ? W : 1600,
                minHeight:   useSingle ? H : 283,
                maxHeight:   isFullscreen ? H : 1131,
                drawShadow:  true,
                showCover:   true,
                usePortrait: useSingle,
                startPage:   savedPageIndex
            });

            pageFlip.on('flip', () => { isFlipping = true; });
            pageFlip.on('changeState', (e) => {
                if (e.data === 'read') {
                    isFlipping = false;
                    if (pageFlip.getCurrentPageIndex() >= totalPages - 1) stopAutoFlip();
                }
            });
            pageFlip.on('init', () => {
                if (wasPlaying) startAutoFlip();
            });

            pageFlip.loadFromHTML(document.querySelectorAll('#flipbook .page'));
        }

        // ── Load PDF (ครั้งแรก) ─────────────────────────────────────
        async function loadPDF(fileUrl) {
            const overlay    = document.getElementById('overlay');
            const flipbookEl = document.getElementById('flipbook');
            const container  = document.getElementById('bookContainer');

            try {
                const res = await fetch(fileUrl);
                if (!res.ok) throw new Error('ไม่พบไฟล์แคตตาล็อกในโฟลเดอร์ ebook');

                const pdf  = await pdfjsLib.getDocument(new Uint8Array(await res.arrayBuffer())).promise;
                totalPages = pdf.numPages;

                for (let n = 1; n <= totalPages; n++) {
                    const page     = await pdf.getPage(n);
                    const viewport = page.getViewport({ scale: 2.2 });
                    const canvas   = document.createElement('canvas');
                    canvas.width   = viewport.width;
                    canvas.height  = viewport.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                    const inner = document.createElement('div');
                    inner.style.cssText = 'width:100%;height:100%;';
                    inner.appendChild(canvas);

                    const pageDiv     = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.appendChild(inner);
                    flipbookEl.appendChild(pageDiv);
                }

                const W = window.innerWidth;
                const H = window.innerHeight;
                const isPortrait = H > W;
                const useSingle  = isIPad && isPortrait;

                pageFlip = new St.PageFlip(flipbookEl, {
                    width:       useSingle ? W : 841,
                    height:      useSingle ? H : 595,
                    size:        'stretch',
                    minWidth:    useSingle ? W : 400,
                    maxWidth:    1600,
                    minHeight:   useSingle ? H : 283,
                    maxHeight:   1131,
                    drawShadow:  true,
                    showCover:   true,
                    usePortrait: useSingle,
                    startPage:   0
                });

                pageFlip.on('flip', () => { isFlipping = true; });
                pageFlip.on('changeState', (e) => {
                    if (e.data === 'read') {
                        isFlipping = false;
                        if (pageFlip.getCurrentPageIndex() >= totalPages - 1) stopAutoFlip();
                    }
                });

                pageFlip.on('init', () => {
                    requestAnimationFrame(() => {
                        container.classList.add('visible');
                        overlay.classList.add('done');
                        overlay.addEventListener('transitionend', () => {
                            overlay.style.display = 'none';
                        }, { once: true });
                        document.getElementById('playPauseBtn').classList.remove('hidden');
                        document.getElementById('fullscreenBtn').classList.remove('hidden');
                        startAutoFlip();
                    });
                });

                pageFlip.loadFromHTML(document.querySelectorAll('#flipbook .page'));

            } catch (err) {
                console.error(err);
                const txt = document.getElementById('loadingText');
                txt.innerText = 'เกิดข้อผิดพลาด: ' + err.message;
                txt.classList.remove('animate-pulse');
            }
        }

        // ── Auto Flip ───────────────────────────────────────────────
        function startAutoFlip() {
            if (autoFlipInterval) clearInterval(autoFlipInterval);
            isAutoPlaying = true; isFlipping = false;
            document.getElementById('btnIcon').innerText = '⏸️';
            document.getElementById('btnText').innerText = 'กำลังเล่นอัตโนมัติ';
            autoFlipInterval = setInterval(() => {
                if (!pageFlip || !isAutoPlaying) return;
                if (pageFlip.getCurrentPageIndex() >= totalPages - 1) { stopAutoFlip(); return; }
                if (!isFlipping) pageFlip.flipNext();
            }, flipSpeed);
        }

        function stopAutoFlip() {
            isAutoPlaying = false;
            if (autoFlipInterval) { clearInterval(autoFlipInterval); autoFlipInterval = null; }
            document.getElementById('btnIcon').innerText = '▶️';
            document.getElementById('btnText').innerText = 'เล่นต่อ';
        }

        function toggleAutoFlip() {
            if (isAutoPlaying) {
                stopAutoFlip();
            } else {
                if (pageFlip && pageFlip.getCurrentPageIndex() >= totalPages - 1) pageFlip.turnToPage(0);
                startAutoFlip();
            }
        }
    </script>
</body>
</html>
