<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Book Viewer (Universal Fullscreen)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
        body { 
            background-color: #0f172a; 
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #bookContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .flip-book {
            margin: 0 auto;
            background-color: #1e293b;
        }
        .page { background-color: white; overflow: hidden; }
        .page-content { width: 100%; height: 100%; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        .controls-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            display: flex;
            gap: 10px;
        }
        .control-btn {
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        /* คลาสสไตล์พิเศษสำหรับบังคับเต็มจอแบบไร้ขอบบน iPad/iOS */
        .ipad-fullscreen-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 40 !important;
            background-color: #0f172a !important;
            padding: 0 !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center">

    <div id="controls" class="controls-wrapper hidden">
        <button id="playPauseBtn" onclick="toggleAutoFlip()" class="control-btn px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
            <span id="btnIcon">⏸️</span>
            <span id="btnText">กำลังเล่นอัตโนมัติ</span>
        </button>

        <button id="fullscreenBtn" onclick="toggleFullscreen()" class="control-btn px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
            <span id="fsIcon">🔲</span>
            <span id="fsText">เต็มจอ</span>
        </button>
    </div>

    <div id="status" class="text-indigo-400 font-medium text-lg animate-pulse">กำลังโหลด...</div>

    <div id="bookContainer" class="hidden">
        <div class="flip-book" id="flipbook"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageFlip;
        let autoFlipInterval = null;
        let isAutoPlaying = false;
        let isFlipping = false; 
        let isCustomFullscreen = false; // สำหรับเช็กสถานะบน iPad
        let totalPages = 0;

        const currentEbook = "catalog (1).pdf"; 
        const flipSpeed = 5000; 

        window.addEventListener('DOMContentLoaded', () => {
            loadPDF(`ebook/${currentEbook}`);
        });

        async function loadPDF(fileUrl) {
            const status = document.getElementById('status');
            const container = document.getElementById('bookContainer');
            const flipbookHtml = document.getElementById('flipbook');

            try {
                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error('ไม่พบไฟล์หนังสือในโฟลเดอร์ ebook');
                
                const arrayBuffer = await response.arrayBuffer();
                const typedarray = new Uint8Array(arrayBuffer);
                
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                totalPages = pdf.numPages;
                
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 2.2 }); 
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    const pageContent = document.createElement('div');
                    pageContent.className = 'page-content';
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    pageContent.appendChild(canvas);
                    pageDiv.appendChild(pageContent);
                    flipbookHtml.appendChild(pageDiv);

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                }

                status.classList.add('hidden');
                container.classList.remove('hidden');

                pageFlip = new St.PageFlip(flipbookHtml, {
                    width: 841,          
                    height: 595,         
                    size: "stretch",     
                    minWidth: 400,
                    maxWidth: 1600,
                    minHeight: 283,
                    maxHeight: 1131,
                    drawShadow: true,
                    showCover: true,     
                    usePortrait: true    
                });

                pageFlip.on('init', () => {
                    document.getElementById('controls').classList.remove('hidden'); 
                    startAutoFlip();
                });

                pageFlip.on('flip', (e) => {
                    isFlipping = true; 
                    const currentPage = e.data + 1;
                    if (currentPage >= totalPages) {
                        stopAutoFlip();
                    }
                });

                pageFlip.on('changeState', (e) => {
                    if (e.data === 'read') {
                        isFlipping = false; 
                    }
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            } catch (error) {
                console.error(error);
                status.innerText = "เกิดข้อผิดพลาด: " + error.message;
                status.classList.remove('animate-pulse');
            }
        }

        function startAutoFlip() {
            if (autoFlipInterval) clearInterval(autoFlipInterval);
            isAutoPlaying = true;
            isFlipping = false;
            
            document.getElementById('btnIcon').innerText = "⏸️";
            document.getElementById('btnText').innerText = "กำลังเล่นอัตโนมัติ";

            autoFlipInterval = setInterval(() => {
                if (pageFlip && !isFlipping && pageFlip.getUpdateState() === 0) { 
                    pageFlip.flipNext();
                }
            }, flipSpeed);
        }

        function stopAutoFlip() {
            isAutoPlaying = false;
            if (autoFlipInterval) {
                clearInterval(autoFlipInterval);
                autoFlipInterval = null;
            }
            document.getElementById('btnIcon').innerText = "▶️";
            document.getElementById('btnText').innerText = "หยุดเล่นชั่วคราว";
        }

        function toggleAutoFlip() {
            if (isAutoPlaying) {
                stopAutoFlip();
            } else {
                if (pageFlip && (pageFlip.getCurrentPageIndex() + 1) >= totalPages) {
                    pageFlip.turnToPage(0);
                }
                startAutoFlip();
            }
        }

        // ฟังก์ชันระบบสลับหน้าจอเต็มจอเวอร์ชันพัฒนาพิเศษ (รองรับคอมพิวเตอร์ + iPad)
        function toggleFullscreen() {
            const container = document.getElementById('bookContainer');
            
            // กรณีเปิดบนคอมพิวเตอร์ทั่วไป (มี API Fullscreen มาตรฐาน)
            if (document.fullscreenEnabled) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().then(() => {
                        document.getElementById('fsIcon').innerText = "❌";
                        document.getElementById('fsText').innerText = "ออกเต็มจอ";
                        if (pageFlip) pageFlip.update();
                    }).catch(() => {
                        runFallbackFullscreen(container); // ถ้าล้มเหลวให้ใช้แบบ iPad
                    });
                } else {
                    document.exitFullscreen().then(() => {
                        document.getElementById('fsIcon').innerText = "🔲";
                        document.getElementById('fsText').innerText = "เต็มจอ";
                        if (pageFlip) pageFlip.update();
                    });
                }
            } else {
                // กรณีเปิดบน iPad / Safari iOS (ทำงานผ่าน CSS Fallscreen แทน)
                runFallbackFullscreen(container);
            }
        }

        // ฟังก์ชันขยายจอเฉพาะของ iPad / iOS ที่ไม่มี Native Fullscreen
        function runFallbackFullscreen(container) {
            isCustomFullscreen = !isCustomFullscreen;
            if (isCustomFullscreen) {
                container.classList.add('ipad-fullscreen-mode');
                document.getElementById('fsIcon').innerText = "❌";
                document.getElementById('fsText').innerText = "ออกเต็มจอ";
            } else {
                container.classList.remove('ipad-fullscreen-mode');
                document.getElementById('fsIcon').innerText = "🔲";
                document.getElementById('fsText').innerText = "เต็มจอ";
            }
            // สั่งให้ตัวเล่มหนังสือคำนวณและปรับสเกลขนาดใหม่ให้พอดีพื้นที่ปัจจุบันทันที
            setTimeout(() => { if (pageFlip) pageFlip.update(); }, 100);
        }

        // ตรวจจับกรณีผู้ใช้คอมพิวเตอร์กดปุ่ม Esc
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('fsIcon').innerText = "🔲";
                document.getElementById('fsText').innerText = "เต็มจอ";
                if (pageFlip) pageFlip.update();
            }
        });
    </script>
</body>
</html>
