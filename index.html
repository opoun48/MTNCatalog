<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Book Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0f172a;
            position: fixed;
        }

        /* Loading overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        #overlay.done { opacity: 0; pointer-events: none; }

        /* Viewer (Flexbox สำหรับจัดให้อยู่กึ่งกลางเสมอ) */
        #viewer {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #viewer.visible { opacity: 1; }

        /* ตัวครอบ Flipbook ใช้ CSS Transform ในการย่อขยาย */
        #flipbook { 
            display: none; 
            transform-origin: center center;
            transition: transform 0.15s ease-out; /* ทำให้ตอนย่อขยายสมูทขึ้น */
        }
        #flipbook.ready { display: block; }
        
        .page { background: white; overflow: hidden; cursor: pointer; }
        .page canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        /* ปุ่มควบคุม */
        .ctrl {
            position: fixed;
            top: 20px;
            z-index: 10000;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }
        #playPauseBtn { right: 170px; }
        #fullscreenBtn { right: 20px; }
        
        @media (max-width: 640px) {
            .ctrl { top: 10px; padding: 6px 12px; font-size: 12px; }
            #playPauseBtn { right: 130px; }
            #fullscreenBtn { right: 10px; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <span id="loadingText" class="text-indigo-400 font-medium text-lg animate-pulse">
            กำลังโหลดแคตตาล็อก...
        </span>
    </div>

    <button id="playPauseBtn" onclick="toggleAutoFlip()"
        class="ctrl hidden px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
        <span id="btnIcon">⏸️</span>
        <span id="btnText">กำลังเล่นอัตโนมัติ</span>
    </button>

    <button id="fullscreenBtn" onclick="toggleFullscreen()"
        class="ctrl hidden px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
        <span id="fsIcon">⛶</span>
        <span id="fsText">เต็มจอ</span>
    </button>

    <div id="viewer">
        <div id="flipbook"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const EBOOK     = "catalog (1).pdf"; // เปลี่ยนชื่อไฟล์ตรงนี้
        const FLIP_MS   = 5000;
        const PADDING   = 20;

        let pageFlip;
        let autoFlipInterval;
        let isPlaying   = false;
        let isFlipping  = false;
        let totalPages  = 0;
        let isFull      = false;
        
        let pdfBaseW = 595; 
        let pdfBaseH = 841;
        let bookW = 0;
        let bookH = 0;
        let isSingle = false;

        /* ── Fullscreen (เปลี่ยนมาขยายทั้งหน้าจอหลัก ปลอดภัยสุด) ── */
        function toggleFullscreen() {
            const docEl = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                try {
                    if (docEl.requestFullscreen) docEl.requestFullscreen();
                    else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
                } catch(e) { console.error("Fullscreen blocked:", e); }
            } else {
                try {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                } catch(e) {}
            }
        }

        ['fullscreenchange', 'webkitfullscreenchange'].forEach(ev => {
            document.addEventListener(ev, () => {
                const nativeFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
                isFull = nativeFS;
                document.getElementById('fsIcon').innerText = isFull ? '✕' : '⛶';
                document.getElementById('fsText').innerText  = isFull ? 'ออกจากเต็มจอ' : 'เต็มจอ';
                
                // ไม่มีการ Destroy หนังสืออีกต่อไป แค่สั่งคำนวณสเกลภาพใหม่เท่านั้น!
                updateScale();
            });
        });

        /* ── Scale Updater (คำนวณการซูมหนังสือให้พอดีจอ) ── */
        function updateScale() {
            if (!pageFlip) return;
            const pad = isFull ? 0 : PADDING * 2;
            const availW = window.innerWidth - pad;
            const availH = window.innerHeight - pad;
            
            // หาอัตราส่วนการย่อขยายที่ทำให้หนังสือพอดีกับหน้าจอที่สุด
            const scale = Math.min(availW / bookW, availH / bookH);
            
            const el = document.getElementById('flipbook');
            el.style.transform = `scale(${scale})`;
        }

        // เมื่อมีการยืดหดหน้าจอ หรือหมุนมือถือ ให้คำนวณสเกลใหม่
        window.addEventListener('resize', updateScale);
        window.addEventListener('orientationchange', () => setTimeout(updateScale, 200));

        /* ── Load PDF & Build ── */
        async function loadPDF(url) {
            const overlay = document.getElementById('overlay');
            const viewer  = document.getElementById('viewer');
            const flipbookEl = document.getElementById('flipbook');

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('ไม่พบไฟล์ ebook');

                const pdf  = await pdfjsLib.getDocument(new Uint8Array(await res.arrayBuffer())).promise;
                totalPages = pdf.numPages;

                const firstPage = await pdf.getPage(1);
                const baseVp = firstPage.getViewport({ scale: 1 });
                pdfBaseW = baseVp.width;
                pdfBaseH = baseVp.height;

                // กำหนดโหมดหน้ากระดาษ (มือถือจอเล็ก หรือแนวตั้ง ให้เป็นหน้าเดี่ยว)
                const screenW = window.innerWidth;
                const screenH = window.innerHeight;
                isSingle = screenW < 768 || screenH > screenW;

                bookW = isSingle ? pdfBaseW : pdfBaseW * 2;
                bookH = pdfBaseH;

                const frag = document.createDocumentFragment();
                for (let n = 1; n <= totalPages; n++) {
                    const page     = await pdf.getPage(n);
                    const viewport = page.getViewport({ scale: 2.0 }); // โหลดชัดเผื่อการซูม
                    const canvas   = document.createElement('canvas');
                    canvas.width   = viewport.width;
                    canvas.height  = viewport.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                    const div = document.createElement('div');
                    div.className = 'page';
                    
                    // คลิกเพื่อเปลี่ยนหน้า
                    div.addEventListener('click', () => {
                        if (pageFlip) {
                            if (pageFlip.getCurrentPageIndex() >= totalPages - 1) {
                                pageFlip.turnToPage(0);
                            } else {
                                pageFlip.flipNext();
                            }
                        }
                    });

                    div.appendChild(canvas);
                    frag.appendChild(div);
                }
                flipbookEl.appendChild(frag);

                // กำหนดขนาดจริงให้กรอบหนังสือ
                flipbookEl.style.width = bookW + 'px';
                flipbookEl.style.height = bookH + 'px';
                flipbookEl.classList.add('ready');

                // เริ่มต้น PageFlip ด้วยขนาด Fixed (ขนาดคงที่ แล้วใช้ CSS ย่อขยายเอา)
                pageFlip = new St.PageFlip(flipbookEl, {
                    width: pdfBaseW, 
                    height: pdfBaseH,
                    size: 'fixed',
                    drawShadow: true,
                    showCover: true,
                    usePortrait: isSingle,
                    clickEventForward: false, 
                    useMouseEvents: true     
                });

                pageFlip.on('flip', () => { isFlipping = true; });
                pageFlip.on('changeState', e => {
                    if (e.data === 'read') {
                        isFlipping = false;
                        if (pageFlip.getCurrentPageIndex() >= totalPages - 1 && isPlaying) {
                            stopAutoFlip();
                        }
                    }
                });

                // ประกอบเสร็จ ให้ปรับสเกลพอดีจอก่อนแสดงผล
                updateScale();

                requestAnimationFrame(() => {
                    viewer.classList.add('visible');
                    overlay.classList.add('done');
                    overlay.addEventListener('transitionend', () => overlay.style.display = 'none', { once: true });
                    document.getElementById('playPauseBtn').classList.remove('hidden');
                    document.getElementById('fullscreenBtn').classList.remove('hidden');
                    startAutoFlip();
                });

            } catch(err) {
                console.error(err);
                const t = document.getElementById('loadingText');
                t.innerText = 'เกิดข้อผิดพลาด: ' + err.message;
                t.classList.remove('animate-pulse');
            }
        }

        /* ── Auto Flip ── */
        function startAutoFlip() {
            if (autoFlipInterval) clearInterval(autoFlipInterval);
            isPlaying = true; isFlipping = false;
            document.getElementById('btnIcon').innerText = '⏸️';
            document.getElementById('btnText').innerText = 'กำลังเล่นอัตโนมัติ';
            autoFlipInterval = setInterval(() => {
                if (!pageFlip || !isPlaying) return;
                if (pageFlip.getCurrentPageIndex() >= totalPages - 1) { stopAutoFlip(); return; }
                if (!isFlipping) pageFlip.flipNext();
            }, FLIP_MS);
        }

        function stopAutoFlip() {
            isPlaying = false;
            clearInterval(autoFlipInterval); autoFlipInterval = null;
            document.getElementById('btnIcon').innerText = '▶️';
            document.getElementById('btnText').innerText = 'เล่นต่อ';
        }

        function toggleAutoFlip() {
            if (isPlaying) {
                stopAutoFlip();
            } else {
                if (pageFlip && pageFlip.getCurrentPageIndex() >= totalPages - 1) pageFlip.turnToPage(0);
                startAutoFlip();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadPDF(`ebook/${EBOOK}`);
        });
    </script>
</body>
</html>
