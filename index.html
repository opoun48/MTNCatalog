<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Book Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0f172a;
            position: fixed;
        }

        /* Loading overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        #overlay.done { opacity: 0; pointer-events: none; }

        /* Viewer */
        #viewer {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 20px;
        }
        #viewer.visible  { opacity: 1; }
        #viewer.fullmode { padding: 0; }

        #flipbook { 
            margin: 0 auto; 
            display: none; 
        }
        #flipbook.ready { display: block; }
        
        .page { background: white; overflow: hidden; height: 100%; width: 100%; cursor: pointer; }
        .page canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        /* ปุ่มควบคุม */
        .ctrl {
            position: fixed;
            top: 20px;
            z-index: 10000;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }
        #playPauseBtn { right: 170px; }
        #fullscreenBtn { right: 20px; }
        
        @media (max-width: 640px) {
            .ctrl { top: 10px; padding: 6px 12px; font-size: 12px; }
            #playPauseBtn { right: 130px; }
            #fullscreenBtn { right: 10px; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <span id="loadingText" class="text-indigo-400 font-medium text-lg animate-pulse">
            กำลังโหลดแคตตาล็อก...
        </span>
    </div>

    <button id="playPauseBtn" onclick="toggleAutoFlip()"
        class="ctrl hidden px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
        <span id="btnIcon">⏸️</span>
        <span id="btnText">กำลังเล่นอัตโนมัติ</span>
    </button>

    <button id="fullscreenBtn" onclick="toggleFullscreen()"
        class="ctrl hidden px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white font-medium text-sm rounded-full shadow-lg border border-slate-600/50 flex items-center gap-2">
        <span id="fsIcon">⛶</span>
        <span id="fsText">เต็มจอ</span>
    </button>

    <div id="viewer">
        <div id="flipbook"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // ปรับเปลี่ยนพาธและชื่อไฟล์ PDF ตรงนี้
        const EBOOK     = "catalog (1).pdf";
        const FLIP_MS   = 5000;
        const PADDING   = 20;

        let pageFlip, autoFlipInterval;
        let isPlaying   = false;
        let isFlipping  = false;
        let totalPages  = 0;
        let isFull      = false;
        let savedPage   = 0;
        
        let pdfBaseW = 595; 
        let pdfBaseH = 841;

        const isIPad = /iPad/i.test(navigator.userAgent) ||
                       (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        /* ── helpers ─────────────────────────────────────── */
        function viewW() { return window.innerWidth;  }
        function viewH() { return window.innerHeight; }

        function bookDims() {
            const pad = isFull ? 0 : PADDING * 2;
            const maxW = viewW() - pad;
            const maxH = viewH() - pad;
            
            const isPortrait = maxH > maxW;
            const single = (isIPad && isPortrait) || maxW < 768; 

            const pdfRatio = pdfBaseW / pdfBaseH;
            let finalW, finalH;
            
            if (single) {
                if (maxW / maxH > pdfRatio) {
                    finalH = maxH;
                    finalW = maxH * pdfRatio;
                } else {
                    finalW = maxW;
                    finalH = maxW / pdfRatio;
                }
            } else {
                const doubleRatio = pdfRatio * 2;
                if (maxW / maxH > doubleRatio) {
                    finalH = maxH;
                    finalW = maxH * doubleRatio;
                } else {
                    finalW = maxW;
                    finalH = maxW / doubleRatio;
                }
            }

            return { 
                W: Math.floor(finalW), 
                H: Math.floor(finalH), 
                single 
            };
        }

        /* ── Fullscreen ──────────────────────────────────── */
        function toggleFullscreen() {
            const viewer = document.getElementById('viewer');

            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                viewer.classList.add('fullmode');
                isFull = true;
                try {
                    if (viewer.requestFullscreen) viewer.requestFullscreen();
                    else if (viewer.webkitRequestFullscreen) viewer.webkitRequestFullscreen();
                } catch(e) {
                    console.error("Fullscreen blocked:", e);
                }
            } else {
                try {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                } catch(e) {}
            }
        }

        ['fullscreenchange','webkitfullscreenchange'].forEach(ev => {
            document.addEventListener(ev, () => {
                const viewer = document.getElementById('viewer');
                const nativeFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
                
                if (nativeFS) {
                    isFull = true;
                    viewer.classList.add('fullmode');
                    document.getElementById('fsIcon').innerText = '✕';
                    document.getElementById('fsText').innerText  = 'ออกจากเต็มจอ';
                } else {
                    isFull = false;
                    viewer.classList.remove('fullmode');
                    document.getElementById('fsIcon').innerText = '⛶';
                    document.getElementById('fsText').innerText  = 'เต็มจอ';
                }

                setTimeout(reinit, 500);
            });
        });

        /* ── Reinit & Build PageFlip ─────────────────────── */
        function reinit() {
            if (!pageFlip) return;
            savedPage = pageFlip.getCurrentPageIndex();
            const wasPlaying = isPlaying;
            if (wasPlaying) stopAutoFlip();

            try { pageFlip.destroy(); } catch(e) {}

            buildPageFlip(() => {
                if (wasPlaying) startAutoFlip();
            });
        }

        function buildPageFlip(onReady) {
            const el = document.getElementById('flipbook');
            const { W, H, single } = bookDims();

            el.style.width = W + 'px';
            el.style.height = H + 'px';
            el.classList.add('ready');

            pageFlip = new St.PageFlip(el, {
                width: single ? W : Math.floor(W / 2), 
                height: H,
                size: 'stretch',
                minWidth: 100,
                maxWidth: W,        
                minHeight: 100,
                maxHeight: H,        
                drawShadow: true,
                showCover: true,
                usePortrait: single,
                startPage: savedPage,
                clickEventForward: false, 
                useMouseEvents: true     
            });

            pageFlip.on('flip', () => { isFlipping = true; });
            pageFlip.on('changeState', e => {
                if (e.data === 'read') {
                    isFlipping = false;
                    if (pageFlip.getCurrentPageIndex() >= totalPages - 1) stopAutoFlip();
                }
            });
            pageFlip.on('init', () => { if (onReady) onReady(); });

            pageFlip.loadFromHTML(document.querySelectorAll('#flipbook .page'));
        }

        /* ── Load PDF ────────────────────────────────────── */
        async function loadPDF(url) {
            const overlay = document.getElementById('overlay');
            const viewer  = document.getElementById('viewer');

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('ไม่พบไฟล์ ebook');

                const pdf  = await pdfjsLib.getDocument(new Uint8Array(await res.arrayBuffer())).promise;
                totalPages = pdf.numPages;

                const firstPage = await pdf.getPage(1);
                const baseVp = firstPage.getViewport({ scale: 1 });
                pdfBaseW = baseVp.width;
                pdfBaseH = baseVp.height;

                const frag = document.createDocumentFragment();
                for (let n = 1; n <= totalPages; n++) {
                    const page     = await pdf.getPage(n);
                    const viewport = page.getViewport({ scale: 2.0 }); 
                    const canvas   = document.createElement('canvas');
                    canvas.width   = viewport.width;
                    canvas.height  = viewport.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                    const wrap = document.createElement('div');
                    wrap.style.cssText = 'width:100%;height:100%;';
                    wrap.appendChild(canvas);

                    const div = document.createElement('div');
                    div.className = 'page';
                    
                    div.addEventListener('click', () => {
                        if (pageFlip) {
                            if (pageFlip.getCurrentPageIndex() >= totalPages - 1) {
                                pageFlip.turnToPage(0);
                            } else {
                                pageFlip.flipNext();
                            }
                        }
                    });

                    div.appendChild(wrap);
                    frag.appendChild(div);
                }
                document.getElementById('flipbook').appendChild(frag);

                buildPageFlip(() => {
                    requestAnimationFrame(() => {
                        viewer.classList.add('visible');
                        overlay.classList.add('done');
                        overlay.addEventListener('transitionend',
                            () => overlay.style.display = 'none', { once: true });
                        document.getElementById('playPauseBtn').classList.remove('hidden');
                        document.getElementById('fullscreenBtn').classList.remove('hidden');
                        startAutoFlip();
                    });
                });

            } catch(err) {
                console.error(err);
                const t = document.getElementById('loadingText');
                t.innerText = 'เกิดข้อผิดพลาด: ' + err.message;
                t.classList.remove('animate-pulse');
            }
        }

        /* ── Auto Flip ───────────────────────────────────── */
        function startAutoFlip() {
            if (autoFlipInterval) clearInterval(autoFlipInterval);
            isPlaying = true; isFlipping = false;
            document.getElementById('btnIcon').innerText = '⏸️';
            document.getElementById('btnText').innerText = 'กำลังเล่นอัตโนมัติ';
            autoFlipInterval = setInterval(() => {
                if (!pageFlip || !isPlaying) return;
                if (pageFlip.getCurrentPageIndex() >= totalPages - 1) { stopAutoFlip(); return; }
                if (!isFlipping) pageFlip.flipNext();
            }, FLIP_MS);
        }

        function stopAutoFlip() {
            isPlaying = false;
            clearInterval(autoFlipInterval); autoFlipInterval = null;
            document.getElementById('btnIcon').innerText = '▶️';
            document.getElementById('btnText').innerText = 'เล่นต่อ';
        }

        function toggleAutoFlip() {
            if (isPlaying) {
                stopAutoFlip();
            } else {
                if (pageFlip && pageFlip.getCurrentPageIndex() >= totalPages - 1) pageFlip.turnToPage(0);
                startAutoFlip();
            }
        }

        /* ── Orientation & Resize ────────────────────────── */
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(reinit, 300);
        });
        window.addEventListener('orientationchange', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(reinit, 300);
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadPDF(`ebook/${EBOOK}`);
        });
    </script>
</body>
</html>
